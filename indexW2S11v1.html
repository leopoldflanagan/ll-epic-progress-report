<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch Loyalty — Epic Progress Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --done:#22c55e;--inprog:#eab308;--todo:#cbd5e1;
  --bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;
  --closed:#059669;--readydeploy:#0d9488;--indev:#2563eb;
  --readydev:#7c3aed;--design:#d97706;--discover:#db2777;
  --backlog:#64748b;--blocked:#dc2626;
}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:0;margin:0}
.page{max-width:1440px;margin:0 auto;padding:28px 32px 48px}

/* Header */
.header{margin-bottom:28px}
.header h1{font-size:30px;font-weight:800;letter-spacing:-.3px;margin-bottom:16px}

/* Week Selector Prominente */
.week-selector-prominent{background:var(--card);padding:16px 20px;border-radius:10px;margin-bottom:16px;box-shadow:0 2px 4px rgba(0,0,0,.08)}
.week-selector-prominent label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.week-selector-prominent select{font-size:16px;font-weight:700;padding:10px 16px;width:100%;max-width:400px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;cursor:pointer}
.baseline-indicator{display:block;font-size:13px;color:var(--muted);margin-top:6px}

/* Meta Box */
.meta-box{background:#f8fafc;padding:12px 16px;border-radius:8px;border:1px solid #e2e8f0}
.meta-line{font-size:15px;margin:5px 0}
.meta-line strong{font-weight:600;color:var(--text)}
.delta-line{margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0}
.delta{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600;margin-right:8px}
.delta.up{background:#dcfce7;color:#15803d}
.delta.down{background:#fee2e2;color:#991b1b}

/* Cards */
.cards{display:grid;grid-template-columns:auto repeat(3,1fr);gap:16px;margin-bottom:28px}
.card{background:var(--card);border-radius:14px;padding:22px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-val{font-size:38px;font-weight:800;line-height:1}
.card-lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-top:6px}
.card-val.v-done{color:var(--done)}.card-val.v-ip{color:var(--inprog)}.card-val.v-todo{color:var(--backlog)}

/* Comparison Cards */
.comparison-panel{background:var(--card);border-radius:14px;padding:20px 24px;margin-bottom:28px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
.comparison-panel h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text)}
.comparison-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.comp-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center}
.comp-card-label{font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.comp-card-change{display:flex;flex-direction:column;align-items:center;gap:4px;margin:12px 0}
.comp-prev{font-size:16px;font-weight:600;color:var(--muted)}
.comp-arrow{font-size:20px;color:var(--muted)}
.comp-current{font-size:28px;font-weight:800;color:var(--text)}
.comp-metric{font-size:11px;color:var(--muted);margin-top:4px}
.comp-delta{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;margin-top:8px}
.comp-delta.positive{background:#dcfce7;color:#15803d}
.comp-delta.negative{background:#fee2e2;color:#991b1b}
.comp-delta.neutral{background:#f1f5f9;color:var(--muted)}

/* Circular progress */
.circ-wrap{position:relative;width:110px;height:110px;margin-bottom:6px}
.circ-wrap svg{width:110px;height:110px;transform:rotate(-90deg)}
.circ-bg{fill:none;stroke:#e2e8f0;stroke-width:10}
.circ-fg{fill:none;stroke:var(--indev);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.circ-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:var(--indev)}

/* Scope Changes Panel */
.scope-panel{background:var(--card);border-radius:14px;padding:20px 24px;margin-bottom:28px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
.scope-panel.collapsed .scope-body{display:none}
.scope-header{cursor:pointer;user-select:none}
.scope-header h2{font-size:20px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.scope-summary{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.scope-metric{font-size:13px;font-weight:600;padding:6px 12px;background:#f1f5f9;border-radius:6px;color:var(--text)}
.scope-toggle{margin-top:12px;padding:8px 20px;background:var(--indev);color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;transition:background .2s}
.scope-toggle:hover{background:#1d4ed8}
.scope-body{margin-top:20px;padding-top:20px;border-top:2px solid #f1f5f9}
.scope-section{margin-bottom:24px}
.scope-section:last-child{margin-bottom:0}
.scope-section h4{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text);display:flex;align-items:center;gap:6px}
.scope-item{padding:8px 12px;background:#fafbfc;border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.scope-item a{font-weight:700;color:var(--indev);text-decoration:none;font-size:13px}
.scope-item a:hover{text-decoration:underline}
.scope-item-name{font-size:13px;color:var(--text);flex:1;min-width:200px}
.scope-item-count{font-size:12px;font-weight:600;color:var(--muted);margin-left:auto}
.scope-item-reason{font-size:12px;color:var(--muted);font-style:italic}
.net-impact{background:#f8fafc;padding:16px;border-radius:8px;border:2px solid #e2e8f0}
.net-impact h4{margin-bottom:8px}
.net-impact p{font-size:14px;line-height:1.6;color:var(--text)}
.refinement-note{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px;padding:8px 12px;background:#fef3c7;border-radius:6px;border-left:3px solid #d97706}

/* Filter + legend row */
.controls{display:flex;align-items:center;gap:24px;margin-bottom:22px;flex-wrap:wrap}
.filter-grp{display:flex;align-items:center;gap:8px}
.filter-grp label{font-weight:600;font-size:14px}
.filter-grp select{padding:7px 12px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px;background:#fff;cursor:pointer}
.legend{display:flex;gap:22px;font-size:15px;font-weight:500}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-sw{width:22px;height:22px;border-radius:5px;flex-shrink:0}

/* Panels */
.panel{background:var(--card);border-radius:14px;padding:24px 28px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);margin-bottom:28px}
.panel>h2{font-size:20px;font-weight:700;margin-bottom:18px}

/* Group header */
.gh{display:flex;align-items:center;gap:10px;padding:11px 8px;margin-top:14px;border-radius:8px;background:#f8fafc;cursor:pointer;user-select:none;transition:background .15s}
.gh:first-child{margin-top:0}
.gh:hover{background:#f1f5f9}
.gh h3{font-size:14px;font-weight:700}
.gh-stats{font-size:12px;color:var(--muted);font-weight:500}
.gh-arrow{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s}
.gh-arrow.collapsed{transform:rotate(-90deg)}
.g-body{overflow:hidden;transition:max-height .35s ease}
.g-body.collapsed{max-height:0!important}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;line-height:1.6}
.b-CLOSED{background:#d1fae5;color:#065f46}
.b-READY_DEPLOYMENT{background:#ccfbf1;color:#0f766e}
.b-IN-DEVELOPMENT{background:#dbeafe;color:#1d4ed8}
.b-READY_TO_DEVELOP{background:#ede9fe;color:#6d28d9}
.b-DESIGN{background:#fef3c7;color:#92400e}
.b-DISCOVER{background:#fce7f3;color:#9d174d}
.b-Backlog{background:#f1f5f9;color:#475569}
.b-BLOCKED{background:#fee2e2;color:#991b1b}

/* Border colors */
.bl-CLOSED{border-left-color:var(--closed)!important}
.bl-READY_DEPLOYMENT{border-left-color:var(--readydeploy)!important}
.bl-IN-DEVELOPMENT{border-left-color:var(--indev)!important}
.bl-READY_TO_DEVELOP{border-left-color:var(--readydev)!important}
.bl-DESIGN{border-left-color:var(--design)!important}
.bl-DISCOVER{border-left-color:var(--discover)!important}
.bl-Backlog{border-left-color:var(--backlog)!important}
.bl-BLOCKED{border-left-color:var(--blocked)!important}

/* Chart bar rows */
.br{display:grid;grid-template-columns:370px 1fr 52px;align-items:center;gap:10px;padding:5px 0 5px 10px;border-bottom:1px solid #f1f5f9;border-left:3px solid transparent;transition:background .1s}
.br:hover{background:#fafbfc}
.br-lbl{display:flex;align-items:center;gap:7px;font-size:13px;line-height:1.35;min-width:0}
.br-lbl a{color:var(--indev);text-decoration:none;font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0}
.br-lbl a:hover{text-decoration:underline}
.br-name{white-space:normal;word-break:break-word}

/* Stacked bar track */
.bt{height:26px;background:#eef2f6;border-radius:5px;display:flex;overflow:visible;position:relative}
.bs{height:100%;display:flex;align-items:center;justify-content:center;border-radius:0;position:relative;overflow:visible}
.bt .bs:first-child{border-radius:5px 0 0 5px}
.bt .bs:last-child{border-radius:0 5px 5px 0}
.bt .bs:only-child{border-radius:5px}
.bs-d{background:var(--done)}.bs-i{background:var(--inprog)}.bs-t{background:var(--todo)}
.bs-lbl{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35);white-space:nowrap;pointer-events:none;line-height:1}
.br-pct{font-size:13px;font-weight:700;text-align:right;white-space:nowrap;color:var(--text)}

/* Details section */
.details-scroll{max-height:720px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#cbd5e1 #f1f5f9}
.details-scroll::-webkit-scrollbar{width:6px}
.details-scroll::-webkit-scrollbar-track{background:#f1f5f9;border-radius:3px}
.details-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.dc{padding:11px 0 11px 10px;border-bottom:1px solid #f1f5f9;border-left:3px solid transparent}
.dc:hover{background:#fafbfc}
.dc-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
.dc-top a{font-weight:700;color:var(--indev);text-decoration:none;font-size:14px}
.dc-top a:hover{text-decoration:underline}
.dc-name{font-size:13.5px;font-weight:500}
.dc-prog{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.dc-bar{width:320px;max-width:100%;height:20px;background:#eef2f6;border-radius:5px;display:flex;overflow:visible;flex-shrink:0}
.dc-bar .bs:first-child{border-radius:5px 0 0 5px}
.dc-bar .bs:last-child{border-radius:0 5px 5px 0}
.dc-bar .bs:only-child{border-radius:5px}
.dc-pct{font-size:14px;font-weight:700;min-width:40px}
.dc-counts{font-size:13px;color:var(--muted)}
.dc-counts span{margin-right:10px}
.dc-counts .cd{color:#16a34a;font-weight:600}
.dc-counts .ci{color:#ca8a04;font-weight:600}
.dc-counts .ct{color:#94a3b8;font-weight:600}

@media(max-width:1000px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .br{grid-template-columns:220px 1fr 46px}
  .comparison-cards{grid-template-columns:1fr}
}
@media(max-width:600px){
  .page{padding:16px}
  .cards{grid-template-columns:1fr 1fr}
  .br{grid-template-columns:1fr;gap:4px}
  .br-lbl{grid-column:1/-1}
  .week-selector-prominent select{max-width:100%}
  .comparison-cards{grid-template-columns:1fr}
}

/* New in Expanded Scope panel */
.new-scope-panel{background:#fff;border-radius:14px;padding:20px 24px;margin-bottom:28px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border-left:4px solid #d97706}
.new-scope-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.new-scope-header h2{font-size:18px;font-weight:700;color:var(--text);margin:0;flex:1}
.new-scope-header .count-badge{background:#fef3c7;color:#92400e;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;margin-left:12px}
.new-scope-header .arrow{transition:transform .2s;margin-left:8px;color:var(--muted);font-size:14px}
.new-scope-header.collapsed .arrow{transform:rotate(-90deg)}
.new-scope-note{font-size:13px;color:var(--muted);margin:8px 0 14px;line-height:1.5}
.new-scope-note code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#f1f5f9;padding:1px 6px;border-radius:4px;color:#475569}
.new-scope-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:8px;margin-top:10px}
.new-scope-list.collapsed{display:none}
.new-scope-item{padding:10px 12px;background:#fafbfc;border-radius:6px;border-left:3px solid #d97706;font-size:13px;display:flex;align-items:center;gap:8px}
.new-scope-item a{color:var(--indev);font-weight:700;text-decoration:none;flex-shrink:0;font-family:ui-monospace,monospace;font-size:12px}
.new-scope-item a:hover{text-decoration:underline}
.new-scope-item .ns-name{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.new-scope-item .ns-status{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;text-transform:uppercase;background:#e2e8f0;color:#475569;white-space:nowrap}

</style>
</head>

const ORDER=['CLOSED','READY DEPLOYMENT','IN-DEVELOPMENT','READY TO DEVELOP','DESIGN','DISCOVER','Backlog','BLOCKED'];
const LABELS={'CLOSED':'Closed','READY DEPLOYMENT':'Ready Deployment','IN-DEVELOPMENT':'In Development','READY TO DEVELOP':'Ready to Develop','DESIGN':'Design','DISCOVER':'Discover','Backlog':'Backlog','BLOCKED':'Blocked'};
function bCls(s){return'b-'+s.replace(/ /g,'_')}
function blCls(s){return'bl-'+s.replace(/ /g,'_')}
const MIN_W=30;

let currentWeek='W2-Sprint11-26';
let D=WEEKS[currentWeek];

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function jira(k){return'https://wellfit.atlassian.net/browse/'+k}
function badge(s){return'<span class="badge '+bCls(s)+'">'+(LABELS[s]||s)+'</span>'}

function segs(e,trackCls){
  const parts=[];
  if(e.done>0)parts.push({n:e.done,c:'bs-d'});
  if(e.inProgress>0)parts.push({n:e.inProgress,c:'bs-i'});
  if(e.todo>0)parts.push({n:e.todo,c:'bs-t'});
  if(!parts.length)return'<div class="'+trackCls+'"><div class="bs bs-t" style="flex:1;min-width:'+MIN_W+'px"></div></div>';
  let h='<div class="'+trackCls+'">';
  parts.forEach(p=>{h+='<div class="bs '+p.c+'" style="flex:'+p.n+';min-width:'+MIN_W+'px"><span class="bs-lbl">'+p.n+'</span></div>'});
  return h+'</div>';
}

function grouped(f){
  const g={};ORDER.forEach(s=>g[s]=[]);
  D.epics.forEach(e=>{if(f!=='ALL'&&e.epicStatus!==f)return;if(g[e.epicStatus])g[e.epicStatus].push(e)});
  Object.values(g).forEach(a=>a.sort((x,y)=>y.percentComplete-x.percentComplete||y.total-x.total));
  return g;
}

let gid=0;
function toggle(id){
  document.getElementById(id).classList.toggle('collapsed');
  document.getElementById(id+'-a').classList.toggle('collapsed');
}


function updateMetaBox(){
  const prevWeekId = D.weeklyThroughput?.vsWeek;
  const prev = prevWeekId ? WEEKS[prevWeekId] : null;
  let html=`<div class="meta-line"><strong>Active Scope:</strong> ${D.totalEpics} Epics, ${D.totalStories} Stories</div>`;
  // Legacy schema: both WNI and Reenbit excluded
  if(D.excludedReebit !== undefined){
    html+=`<div class="meta-line"><strong>Excluded:</strong> ${D.excludedWNI} WNI epics, ${D.excludedReebit} Reenbit epics</div>`;
  }
  // New schema (W2-Sprint11-26+): Reenbit included in totals
  else {
    html+=`<div class="meta-line"><strong>Excluded:</strong> ${D.excludedWNI} WNI epics</div>`;
    html+=`<div class="meta-line"><strong>Reenbit:</strong> ${D.reenbitIncluded} epics included in totals (expanded scope)</div>`;
  }
  // Methodology banner (shown only on weeks that define methodologyNote)
  if(D.methodologyNote){
    html+=`<div class="meta-line" style="margin-top:10px;padding:10px 12px;background:#fef3c7;border-left:3px solid #d97706;border-radius:6px;font-size:13px;color:#78350f;line-height:1.5">${D.methodologyNote}</div>`;
  }
  if(prev){
    const epicDelta=D.totalEpics-prev.totalEpics;
    const storyDelta=D.totalStories-prev.totalStories;
    html+=`<div class="meta-line delta-line">`;
    html+=`<span class="delta ${epicDelta>=0?'up':'down'}">${epicDelta>=0?'+':''}${epicDelta} epics</span>`;
    html+=`<span class="delta ${storyDelta>=0?'up':'down'}">${storyDelta>=0?'+':''}${storyDelta} stories</span>`;
    html+=`vs ${prevWeekId}</div>`;
  }
  document.getElementById('metaBox').innerHTML=html;
}



function renderNewInScopePanel(){
  const panel = document.getElementById('newScopePanel');
  const list = D.newInExpandedScope;
  if(!list || !list.length){
    panel.style.display='none';
    return;
  }
  panel.style.display='block';
  let html = `<div class="new-scope-header collapsed" onclick="toggleNewScope()">`;
  html += `<h2>📋 Epics Newly in Scope</h2>`;
  html += `<span class="count-badge">${list.length}</span>`;
  html += `<span class="arrow" id="newScopeArrow">▼</span>`;
  html += `</div>`;
  html += `<div class="new-scope-note">These epics now appear due to expanded scope criteria. Most existed before but were filtered out by the previous filter (<code>project=LL</code>). They are not newly-created work.</div>`;
  html += `<div class="new-scope-list collapsed" id="newScopeList">`;
  const sorted = [...list].sort((a,b) => {
    const order = {'IN-DEVELOPMENT':1,'READY TO DEVELOP':2,'DESIGN':3,'DISCOVER':4,'Backlog':5,'BLOCKED':6};
    return (order[a.epicStatus]||99) - (order[b.epicStatus]||99);
  });
  sorted.forEach(e => {
    html += `<div class="new-scope-item">`;
    html += `<a href="https://wellfit.atlassian.net/browse/${e.key}" target="_blank">${e.key}</a>`;
    html += `<span class="ns-name" title="${esc(e.name)}">${esc(e.name)}</span>`;
    html += `<span class="ns-status">${e.epicStatus}</span>`;
    html += `</div>`;
  });
  html += `</div>`;
  panel.innerHTML = html;
}
function toggleNewScope(){
  document.querySelector('#newScopePanel .new-scope-header').classList.toggle('collapsed');
  document.getElementById('newScopeList').classList.toggle('collapsed');
}

function renderComparisonCards(){
  // Solo mostrar si hay semana previa
  if(currentWeek==='W2-Sprint8-26'){
    document.getElementById('comparisonPanel').style.display='none';
    return;
  }
  
  // Obtener semana previa desde weeklyThroughput.vsWeek
  const prevWeekId = D.weeklyThroughput?.vsWeek;
  const prev = prevWeekId ? WEEKS[prevWeekId] : null;
  
  if(!prev){
    document.getElementById('comparisonPanel').style.display='none';
    return;
  }
  
  document.getElementById('comparisonPanel').style.display='block';
  document.getElementById('comparisonTitle').textContent=`📊 Week-over-Week Comparison (${currentWeek} vs ${prevWeekId})`;
  
  // Calcular métricas
  const progressDelta=D.summary.overallPercent-prev.summary.overallPercent;
  const throughput = D.weeklyThroughput?.completed || 0;
  const throughputDelta = D.weeklyThroughput?.delta || 0;
  
  // Contar epics al 100% (done independiente del status)
  const prevAt100=prev.epics.filter(e=>e.percentComplete===100).length;
  const currAt100=D.epics.filter(e=>e.percentComplete===100).length;
  const at100Delta=currAt100-prevAt100;
  
  // Renderizar cards
  let html='';
  
  // Card 1: Progress
  html+=`<div class="comp-card">
    <div class="comp-card-label">Progress</div>
    <div class="comp-card-change">
      <div class="comp-prev">${prev.summary.overallPercent}%</div>
      <div class="comp-arrow">↓</div>
      <div class="comp-current">${D.summary.overallPercent}%</div>
    </div>
    <div class="comp-delta ${progressDelta>0?'positive':progressDelta<0?'negative':'neutral'}">
      ${Math.abs(progressDelta)}% ${progressDelta>0?'↑':progressDelta<0?'↓':''}
    </div>
  </div>`;
  
  // Card 2: Throughput
  html+=`<div class="comp-card">
    <div class="comp-card-label">Throughput</div>
    <div class="comp-card-change">
      <div class="comp-prev">${prev.weeklyThroughput?.completed || 0}</div>
      <div class="comp-arrow">↓</div>
      <div class="comp-current">${throughput}</div>
    </div>
    <div class="comp-metric">stories completed</div>
    <div class="comp-delta ${throughputDelta>0?'positive':throughputDelta<0?'negative':'neutral'}">
      ${Math.abs(throughputDelta)} ${throughputDelta>0?'↑':throughputDelta<0?'↓':''} vs last week
    </div>
  </div>`;
  
  // Card 3: Epics 100%
  html+=`<div class="comp-card">
    <div class="comp-card-label">Epics 100%</div>
    <div class="comp-card-change">
      <div class="comp-prev">${prevAt100}</div>
      <div class="comp-arrow">↓</div>
      <div class="comp-current">${currAt100}</div>
    </div>
    <div class="comp-metric">${currAt100===1?'epic':'epics'} at 100%</div>
    <div class="comp-delta ${at100Delta>0?'positive':at100Delta<0?'negative':'neutral'}">
      ${at100Delta>0?'+':''}${at100Delta} ${at100Delta>0?'↑':at100Delta<0?'↓':''} vs last week
    </div>
  </div>`;
  
  document.getElementById('comparisonCards').innerHTML=html;
}

function renderCards(){
  const s=D.summary,pct=s.overallPercent;
  const circ=2*Math.PI*44;
  const off=circ*(1-pct/100);
  document.getElementById('summaryCards').innerHTML=
    '<div class="card"><div class="circ-wrap"><svg viewBox="0 0 100 100"><circle class="circ-bg" cx="50" cy="50" r="44"/><circle class="circ-fg" cx="50" cy="50" r="44" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg><div class="circ-pct">'+pct+'%</div></div><div class="card-lbl">Overall Progress</div></div>'+
    '<div class="card"><div class="card-val v-done">'+s.totalDone+'</div><div class="card-lbl">Done</div></div>'+
    '<div class="card"><div class="card-val v-ip">'+s.totalInProgress+'</div><div class="card-lbl">In Progress</div></div>'+
    '<div class="card"><div class="card-val v-todo">'+s.totalTodo+'</div><div class="card-lbl">To Do</div></div>';
}

function initFilter(){
  const sel=document.getElementById('sf');
  sel.innerHTML='<option value="ALL">All Statuses</option>';
  const present=new Set(D.epics.map(e=>e.epicStatus));
  ORDER.forEach(s=>{if(present.has(s)){const o=document.createElement('option');o.value=s;o.textContent=LABELS[s]||s;sel.appendChild(o)}});
}

function renderChart(f){
  const g=grouped(f);gid=0;
  let h='';
  ORDER.forEach(st=>{
    const epics=g[st];if(!epics.length)return;
    const td=epics.reduce((a,e)=>a+e.done,0);
    const ti=epics.reduce((a,e)=>a+e.inProgress,0);
    const tt=epics.reduce((a,e)=>a+e.todo,0);
    const ts=td+ti+tt;
    const pct=ts?Math.round(td/ts*100):0;
    const id='cg'+(gid++);
    h+='<div class="gh" onclick="toggle(\''+id+'\')">'
      +badge(st)
      +' <h3>'+(LABELS[st]||st)+'</h3>'
      +' <span class="gh-stats">'+epics.length+' epics, '+ts+' stories, '+td+' done ('+pct+'%)</span>'
      +'<span class="gh-arrow collapsed" id="'+id+'-a">&#9660;</span>'
      +'</div>';
    h+='<div class="g-body collapsed" id="'+id+'">';
    epics.forEach(e=>{
      h+='<div class="br '+blCls(e.epicStatus)+'">'
        +'<div class="br-lbl"><a href="'+jira(e.key)+'" target="_blank" rel="noopener">'+e.key+'</a><span class="br-name">'+esc(e.name)+'</span></div>'
        +segs(e,'bt')
        +'<div class="br-pct">'+e.percentComplete+'%</div>'
        +'</div>';
    });
    h+='</div>';
  });
  document.getElementById('chart').innerHTML=h;
}

function renderDetails(f){
  const g=grouped(f);
  let h='';
  ORDER.forEach(st=>{
    const epics=g[st];if(!epics.length)return;
    const td=epics.reduce((a,e)=>a+e.done,0);
    const ti=epics.reduce((a,e)=>a+e.inProgress,0);
    const tt=epics.reduce((a,e)=>a+e.todo,0);
    const ts=td+ti+tt;
    const pct=ts?Math.round(td/ts*100):0;
    const id='dg'+(gid++);
    h+='<div class="gh" onclick="toggle(\''+id+'\')">'
      +badge(st)
      +' <h3>'+(LABELS[st]||st)+'</h3>'
      +' <span class="gh-stats">'+epics.length+' epics, '+ts+' stories &middot; Done: '+td+' | In Progress: '+ti+' | Todo: '+tt+' ('+pct+'%)</span>'
      +'<span class="gh-arrow collapsed" id="'+id+'-a">&#9660;</span>'
      +'</div>';
    h+='<div class="g-body collapsed" id="'+id+'">';
    epics.forEach(e=>{
      h+='<div class="dc '+blCls(e.epicStatus)+'">'
        +'<div class="dc-top">'
          +'<a href="'+jira(e.key)+'" target="_blank" rel="noopener">'+e.key+'</a>'
          +badge(e.epicStatus)
          +'<span class="dc-name">'+esc(e.name)+'</span>'
        +'</div>'
        +'<div class="dc-prog">'
          +segs(e,'dc-bar')
          +'<span class="dc-pct">'+e.percentComplete+'%</span>'
          +'<div class="dc-counts">'
            +'<span class="cd">Done: '+e.done+'</span>'
            +'<span class="ci">In Progress: '+e.inProgress+'</span>'
            +'<span class="ct">Todo: '+e.todo+'</span>'
          +'</div>'
        +'</div>'
        +'</div>';
    });
    h+='</div>';
  });
  document.getElementById('details').innerHTML=h;
}

function render(){
  const f=document.getElementById('sf').value;
  renderChart(f);
  renderDetails(f);
}

function loadWeek(weekId){
  currentWeek=weekId;
  D=WEEKS[weekId];
  updateMetaBox();
  renderNewInScopePanel();
  renderCards();
  renderComparisonCards();
  initFilter();
  render();
}

updateMetaBox();
  renderNewInScopePanel();
renderCards();

initFilter();
render();

document.getElementById('weekSelect').addEventListener('change',(e)=>{loadWeek(e.target.value)});
document.getElementById('sf').addEventListener('change',render);
