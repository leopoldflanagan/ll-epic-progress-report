<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Loyalty - Epic Progress Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #151922;
            --bg-card-hover: #1a1f2e;
            --border: #252b3a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0ac;
            --text-muted: #5f6572;
            --accent-primary: #4da6ff;
            --accent-success: #00d4aa;
            --accent-warning: #ffb84d;
            --accent-danger: #ff6b6b;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #4da6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Week Selector */
        .week-selector {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .week-selector label {
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        select {
            flex: 1;
            max-width: 300px;
            padding: 0.75rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover {
            border-color: var(--accent-primary);
        }

        select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(77, 166, 255, 0.1);
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .metric-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .metric-card:hover::before {
            opacity: 1;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .metric-delta {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.9rem;
            font-family: 'IBM Plex Mono', monospace;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .metric-delta.positive {
            color: var(--accent-success);
            background: rgba(0, 212, 170, 0.1);
        }

        .metric-delta.negative {
            color: var(--accent-danger);
            background: rgba(255, 107, 107, 0.1);
        }

        .metric-delta.neutral {
            color: var(--text-muted);
            background: rgba(95, 101, 114, 0.1);
        }

        /* Chart Containers */
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .chart-wrapper.tall {
            height: 400px;
        }

        /* Distribution Grid */
        .distribution-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .distribution-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .metric-card {
            animation: fadeIn 0.5s ease-out;
        }

        .metric-card:nth-child(1) { animation-delay: 0.1s; }
        .metric-card:nth-child(2) { animation-delay: 0.2s; }
        .metric-card:nth-child(3) { animation-delay: 0.3s; }
        .metric-card:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Launch Loyalty</h1>
            <div class="subtitle">Epic Progress Report • Wellfit</div>
        </header>

        <div class="week-selector">
            <label for="weekSelect">Report Week:</label>
            <select id="weekSelect">
                <option value="">Loading...</option>
            </select>
        </div>

        <div id="content">
            <div class="loading">Loading report data...</div>
        </div>
    </div>

    <script>
        // Chart.js defaults
        Chart.defaults.color = '#9aa0ac';
        Chart.defaults.font.family = "'Work Sans', sans-serif";
        Chart.defaults.borderColor = '#252b3a';

        let currentData = null;
        let previousData = null;
        let chartInstances = {};

        // Load manifest and populate week selector
        async function loadManifest() {
            try {
                const response = await fetch('data/manifest.json');
                const manifest = await response.json();
                
                const select = document.getElementById('weekSelect');
                select.innerHTML = '';
                
                manifest.weeks.forEach(week => {
                    const option = document.createElement('option');
                    option.value = week.id;
                    option.textContent = week.label;
                    select.appendChild(option);
                });

                // Load latest week by default
                select.value = manifest.latest;
                await loadWeekData(manifest.latest);

                // Add change listener
                select.addEventListener('change', (e) => loadWeekData(e.target.value));
            } catch (error) {
                console.error('Error loading manifest:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="loading">Error loading report data</div>';
            }
        }

        // Load specific week data
        async function loadWeekData(weekId) {
            try {
                const response = await fetch(`data/${weekId}.json`);
                const data = await response.json();
                
                // Load previous week data if available
                const weekNumber = parseInt(weekId.match(/W(\d+)/)[1]);
                const year = weekId.match(/(\d{4})/)[1];
                const prevWeekId = `W${weekNumber - 1}-${year}`;
                
                try {
                    const prevResponse = await fetch(`data/${prevWeekId}.json`);
                    previousData = await prevResponse.json();
                } catch {
                    previousData = null;
                }
                
                currentData = data;
                renderReport();
            } catch (error) {
                console.error('Error loading week data:', error);
            }
        }

        // Calculate delta
        function calculateDelta(current, previous) {
            if (!previous) return null;
            return current - previous;
        }

        // Format delta
        function formatDelta(delta) {
            if (delta === null) return '';
            const sign = delta > 0 ? '+' : '';
            return `${sign}${delta}`;
        }

        // Get delta class
        function getDeltaClass(delta, inverse = false) {
            if (delta === null) return 'neutral';
            if (inverse) {
                return delta < 0 ? 'positive' : delta > 0 ? 'negative' : 'neutral';
            }
            return delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral';
        }

        // Render complete report
        function renderReport() {
            const prev = previousData ? previousData.summary : null;
            const curr = currentData.summary;

            const epicDelta = calculateDelta(curr.totalEpics, prev?.totalEpics);
            const storyDelta = calculateDelta(curr.totalStories, prev?.totalStories);
            const doneDelta = calculateDelta(curr.completedStories, prev?.completedStories);
            const pctDelta = calculateDelta(curr.percentComplete, prev?.percentComplete);

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">Total Epics</div>
                        <div class="metric-value">${curr.totalEpics}</div>
                        ${epicDelta !== null ? `<span class="metric-delta ${getDeltaClass(epicDelta)}">${formatDelta(epicDelta)} from last week</span>` : ''}
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">Total Stories</div>
                        <div class="metric-value">${curr.totalStories}</div>
                        ${storyDelta !== null ? `<span class="metric-delta ${getDeltaClass(storyDelta)}">${formatDelta(storyDelta)} from last week</span>` : ''}
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">Completed Stories</div>
                        <div class="metric-value">${curr.completedStories}</div>
                        ${doneDelta !== null ? `<span class="metric-delta ${getDeltaClass(doneDelta)}">${formatDelta(doneDelta)} from last week</span>` : ''}
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">Percent Complete</div>
                        <div class="metric-value">${curr.percentComplete}%</div>
                        ${pctDelta !== null ? `<span class="metric-delta ${getDeltaClass(pctDelta)}">${formatDelta(pctDelta)}pp from last week</span>` : ''}
                    </div>
                </div>

                <div class="chart-grid">
                    <div class="chart-container">
                        <div class="chart-title">Story Distribution by Status</div>
                        <div class="chart-wrapper">
                            <canvas id="storyDistChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-container">
                        <div class="chart-title">Throughput</div>
                        <div class="chart-wrapper">
                            <canvas id="throughputChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="distribution-grid">
                    <div class="chart-container">
                        <div class="chart-title">Epic Distribution by Status</div>
                        <div class="chart-wrapper tall">
                            <canvas id="epicDistChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Destroy existing charts
            Object.values(chartInstances).forEach(chart => chart.destroy());
            chartInstances = {};

            // Render charts
            renderStoryDistribution();
            renderEpicDistribution();
            renderThroughput();
        }

        // Story distribution chart
        function renderStoryDistribution() {
            const ctx = document.getElementById('storyDistChart').getContext('2d');
            const dist = currentData.storyDistribution;

            chartInstances.storyDist = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Done', 'In Progress', 'Ready to Develop', 'Backlog'],
                    datasets: [{
                        data: [dist.done, dist.inProgress, dist.readyToDevelop, dist.backlog],
                        backgroundColor: [
                            'rgba(0, 212, 170, 0.8)',
                            'rgba(77, 166, 255, 0.8)',
                            'rgba(255, 184, 77, 0.8)',
                            'rgba(95, 101, 114, 0.5)'
                        ],
                        borderRadius: 6,
                        borderWidth: 0
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(21, 25, 34, 0.95)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            borderColor: '#252b3a',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#252b3a' },
                            ticks: { color: '#9aa0ac' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#9aa0ac', font: { size: 12 } }
                        }
                    }
                }
            });
        }

        // Epic distribution chart
        function renderEpicDistribution() {
            const ctx = document.getElementById('epicDistChart').getContext('2d');
            const dist = currentData.epicDistribution;

            chartInstances.epicDist = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Closed', 'Ready Deployment', 'In Development', 'Ready to Develop', 'Design', 'Discover', 'Backlog'],
                    datasets: [{
                        data: [
                            dist.closed,
                            dist.readyDeployment,
                            dist.inDevelopment,
                            dist.readyToDevelop,
                            dist.design,
                            dist.discover,
                            dist.backlog
                        ],
                        backgroundColor: [
                            'rgba(0, 212, 170, 0.8)',
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(77, 166, 255, 0.8)',
                            'rgba(255, 184, 77, 0.8)',
                            'rgba(245, 87, 108, 0.8)',
                            'rgba(158, 119, 237, 0.8)',
                            'rgba(95, 101, 114, 0.5)'
                        ],
                        borderWidth: 2,
                        borderColor: '#151922'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                color: '#9aa0ac',
                                font: { size: 11 }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(21, 25, 34, 0.95)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            borderColor: '#252b3a',
                            borderWidth: 1
                        }
                    }
                }
            });
        }

        // Throughput chart
        function renderThroughput() {
            const ctx = document.getElementById('throughputChart').getContext('2d');
            const throughput = currentData.throughput;

            chartInstances.throughput = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Last 30 Days', 'Avg per Week'],
                    datasets: [{
                        data: [throughput.last30Days, throughput.averagePerWeek],
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(77, 166, 255, 0.8)'
                        ],
                        borderRadius: 6,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(21, 25, 34, 0.95)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            borderColor: '#252b3a',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#252b3a' },
                            ticks: { color: '#9aa0ac' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#9aa0ac' }
                        }
                    }
                }
            });
        }

        // Initialize
        loadManifest();
    </script>
</body>
</html>
