name: Auto Refresh Dashboard

on:
  # Ejecuta automáticamente cada día a las 8 AM UTC (3 AM EST)
  schedule:
    - cron: '0 8 * * *'
  
  # Permite ejecución manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual refresh'
        required: false
        default: 'Manual refresh requested'

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          pip install requests
      
      - name: 📡 Fetch fresh data from Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python refresh_dashboard.py
      
      - name: 📊 Check for changes
        id: check_changes
        run: |
          if git diff --quiet index.html; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: 💾 Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "🔄 Auto-refresh dashboard data - $TIMESTAMP"
          git push
      
      - name: ✅ Summary
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Dashboard updated successfully"
            echo "🔗 https://leopoldflanagan.github.io/ll-epic-progress-report/"
          else
            echo "ℹ️  No changes - dashboard is up to date"
          fi
